<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FreeBit Monitor</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-icon">₿</span>
        <h1>FreeBit Monitor</h1>
      </div>
      <div id="status-tag" class="status-tag disconnected">Disconnected</div>
    </header>

    <main>
      <section class="stats-card">
        <div class="stat-item">
          <label>W / L</label>
          <span id="win-loss">0 / 0</span>
        </div>
        <div class="stat-item">
          <label>Profit</label>
          <span id="total-profit" class="profit-value">0.00000000 ₿</span>
        </div>
      </section>

      <section class="control-section">
        <button id="nav-btn" class="secondary-btn">Go to Multiply BTC</button>
        <div class="action-row">
          <button id="start-btn" class="primary-btn">Start Auto-Bet</button>
          <button id="stop-btn" class="danger-btn" disabled>Stop</button>
        </div>
      </section>

      <section class="history-section">
        <div class="history-header">
          <h2>Roll History</h2>
          <button id="clear-btn" class="text-btn">Clear</button>
        </div>
        <ul id="history-list" class="history-list">
          <!-- History items will be injected here -->
          <li class="empty-msg">Waiting for results...</li>
        </ul>
      </section>
    </main>

    <footer>
      <p>Automation active only on Multiply BTC page.</p>
    </footer>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
